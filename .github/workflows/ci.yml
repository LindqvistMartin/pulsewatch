name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Satisfies Program.cs startup validation — ApiFactory replaces this with
      # the Testcontainers connection string via ConfigureWebHost/ConfigureServices
      ConnectionStrings__Postgres: "Host=placeholder;Database=placeholder;Username=placeholder;Password=placeholder"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
      - run: dotnet restore
      - run: dotnet build --no-restore
      - run: dotnet test --no-build --verbosity normal
